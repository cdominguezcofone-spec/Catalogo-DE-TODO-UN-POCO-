<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>De Todo Un Poco</title>

<style>
body {font-family: Arial; margin:0; background:#f5f5f5;}
header {background:#ff7a00; color:white; text-align:center; padding:20px;}
.container {padding:20px;}
.grid {display:grid; grid-template-columns: repeat(auto-fit, minmax(220px,1fr)); gap:20px;}
.card {background:white; padding:15px; border-radius:10px; text-align:center;}
.card img {width:100%; height:200px; object-fit:cover;}
.btn {background:#25D366; color:white; padding:10px; border:none; border-radius:5px;}
</style>

</head>
<body>

<header>
<h1>De Todo Un Poco</h1>
<p>Catálogo</p>
</header>

<div class="container">
<div class="grid" id="catalogo"></div>
</div>

<script>

const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSYFL6PZVNPKR0cIvM_rdBBFv9lzARFUx3auKhbnTqKe5iooMhgwmUEziLAsyBWWgoydXprwM3qRpUT/gviz/tq?tqx=out:json";

fetch(url)
.then(res => res.text())
.then(data => {

 const json = JSON.parse(data.substring(47).slice(0, -2));
 const rows = json.table.rows;

 const catalogo = document.getElementById("catalogo");

 rows.forEach(r => {

   const nombre = r.c[0]?.v;
   const precio = r.c[1]?.v;
   const imagen = r.c[2]?.v;
   const whatsapp = r.c[3]?.v;

   // 🔥 ESTO ASEGURA QUE ALGO SE MUESTRE SIEMPRE
   catalogo.innerHTML += `
   <div class="card">
     <img src="${imagen || 'https://via.placeholder.com/300'}">
     <h3>${nombre || 'Producto sin nombre'}</h3>
     <p>${precio || ''}</p>
     <a href="${whatsapp || '#'}" target="_blank">
       <button class="btn">Consultar</button>
     </a>
   </div>`;

 });

});

</script>

</body>
</html>
