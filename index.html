<script>

const url = "PEGÁ_ACÁ_TU_LINK_CSV";

fetch(url)
.then(res => res.text())
.then(data => {

 const filas = data.split("\n").slice(1);
 const catalogo = document.getElementById("catalogo");

 filas.forEach(f => {

   const col = f.split(",");

   if(col.length > 1){

     catalogo.innerHTML += `
     <div class="card">
       <img src="${col[2] || 'https://via.placeholder.com/300'}">
       <h3>${col[0]}</h3>
       <p>${col[1]}</p>
     </div>`;

   }

 });

});

</script>
