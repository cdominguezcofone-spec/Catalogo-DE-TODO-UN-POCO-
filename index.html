<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Catálogo con Buscador</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f5f5f5;
}

header {
  background: #ff6600;
  color: white;
  padding: 15px;
  text-align: center;
}

.buscador {
  padding: 15px;
  text-align: center;
}

.buscador input {
  width: 80%;
  max-width: 400px;
  padding: 10px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 15px;
  padding: 20px;
}

.card {
  background: white;
  border-radius: 10px;
  padding: 10px;
  text-align: center;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}

.card img {
  width: 100%;
  height: 200px;
  object-fit: cover;
  border-radius: 10px;
}

.precio {
  font-size: 18px;
  font-weight: bold;
}

.categoria {
  font-size: 14px;
  color: gray;
}

.btn {
  display: block;
  margin-top: 10px;
  padding: 10px;
  background: #25D366;
  color: white;
  text-decoration: none;
  border-radius: 5px;
  font-weight: bold;
}
</style>
</head>

<body>

<header>
  <h1>Catálogo de Productos</h1>
</header>

<div class="buscador">
  <input type="text" id="busqueda" placeholder="Buscar producto o categoría...">
</div>

<div id="productos" class="grid"></div>

<script>
const URL = "https://opensheet.elk.sh/1YutuIhavNR7nXoREl3mJtS7IRRpvIgWWlMQnD1aRW0o/Hoja1";

const contenedor = document.getElementById("productos");
const inputBusqueda = document.getElementById("busqueda");

let productos = [];

function mostrarProductos(lista) {
  contenedor.innerHTML = "";

  if (lista.length === 0) {
    contenedor.innerHTML = "<p>No se encontraron productos</p>";
    return;
  }

  lista.forEach(p => {

    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <img src="${p.IMAGEN}">
      <h3>${p.NOMBRE}</h3>
      <p class="precio">$${p.PRECIO}</p>
      <p class="categoria">${p.CATEGORIA}</p>
      <a class="btn" href="${p.WHATSAPP}" target="_blank">
        Consultar por WhatsApp
      </a>
    `;

    contenedor.appendChild(card);
  });
}

// Cargar datos
fetch(URL)
  .then(res => res.json())
  .then(data => {
    productos = data;
    mostrarProductos(productos);
  });

// Buscador
inputBusqueda.addEventListener("input", () => {
  const texto = inputBusqueda.value.toLowerCase();

  const filtrados = productos.filter(p =>
    (p.NOMBRE && p.NOMBRE.toLowerCase().includes(texto)) ||
    (p.CATEGORIA && p.CATEGORIA.toLowerCase().includes(texto))
  );

  mostrarProductos(filtrados);
});
</script>

</body>
</html>
