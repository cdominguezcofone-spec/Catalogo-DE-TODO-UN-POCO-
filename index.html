<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Catálogo</title>

<style>
body { margin:0; font-family:Arial; background:#f5f5f5; }
header { background:#ff6600; color:white; padding:15px; text-align:center; }
.buscador { padding:15px; text-align:center; }
.buscador input { width:80%; max-width:400px; padding:10px; border-radius:8px; }
.grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:15px; padding:20px; }
.card { background:white; border-radius:10px; padding:10px; text-align:center; }
.card img { width:100%; height:200px; object-fit:cover; border-radius:10px; }
.btn { display:block; margin-top:10px; padding:10px; background:#25D366; color:white; text-decoration:none; border-radius:5px; }
</style>
</head>

<body>

<header><h1>Catálogo</h1></header>

<div class="buscador">
<input type="text" id="busqueda" placeholder="Buscar producto...">
</div>

<div id="productos" class="grid"></div>

<script>
const URL = "https://opensheet.elk.sh/1YutuIhavNR7nXoREl3mJtS7IRRpvIgWWlMQnD1aRW0o/Hoja%201";

let productos = [];
const contenedor = document.getElementById("productos");
const input = document.getElementById("busqueda");

function limpiarPrecio(precio){
  return precio.replace(/[^0-9]/g, "");
}

function mostrar(lista){
  contenedor.innerHTML = "";

  lista.forEach(p => {

    // 👇 VALIDACIONES IMPORTANTES
    if(!p.IMAGEN || !p.NOMBRE) return;

    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <img src="${p.IMAGEN}" onerror="this.src='https://via.placeholder.com/200'">
      <h3>${p.NOMBRE}</h3>
      <p>$${limpiarPrecio(p.PRECIO)}</p>
      <p>${p.CATEGORIA}</p>
      <a class="btn" href="${p.WHATSAPP}" target="_blank">Consultar</a>
    `;

    contenedor.appendChild(card);
  });
}

fetch(URL)
  .then(r => r.json())
  .then(data => {
    console.log(data); // 👈 para debug
    productos = data;
    mostrar(productos);
  });

input.addEventListener("input", () => {
  const t = input.value.toLowerCase();

  const filtrados = productos.filter(p =>
    (p.NOMBRE && p.NOMBRE.toLowerCase().includes(t)) ||
    (p.CATEGORIA && p.CATEGORIA.toLowerCase().includes(t))
  );

  mostrar(filtrados);
});
</script>

</body>
</html>
