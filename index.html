<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Catálogo</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{font-family:Arial;margin:0;background:#f5f5f5}
header{background:#ff7a00;color:white;text-align:center;padding:20px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:20px;padding:20px}
.card{background:white;padding:15px;border-radius:10px;text-align:center}
.card img{width:100%;height:200px;object-fit:cover}
.btn{background:#25D366;color:white;padding:10px;border:none;border-radius:5px}
</style>
</head>

<body>

<header>
<h1>De Todo Un Poco</h1>
</header>

<div class="grid" id="catalogo"></div>

<script>

const sheetID = "1YutuIhavNR7nXoREl3mJtS7IRRpvIgWWlMQnD1aRW0o";
const url = `https://docs.google.com/spreadsheets/d/${sheetID}/gviz/tq?tqx=out:json`;

fetch(url)
.then(res => res.text())
.then(data => {

 const json = JSON.parse(data.substr(47).slice(0, -2));
 const rows = json.table.rows;

 const catalogo = document.getElementById("catalogo");

 if(rows.length === 0){
   catalogo.innerHTML = "<p>No hay productos cargados</p>";
   return;
 }

 rows.forEach(r => {

   const nombre = r.c[0]?.v || "Producto";
   const precio = r.c[1]?.v || "";
   const imagen = r.c[2]?.v || "https://via.placeholder.com/300";
   const whatsapp = r.c[3]?.v || "#";

   catalogo.innerHTML += `
   <div class="card">
     <img src="${imagen}">
     <h3>${nombre}</h3>
     <p>${precio}</p>
     <a href="${whatsapp}" target="_blank">
       <button class="btn">Consultar</button>
     </a>
   </div>`;

 });

})
.catch(error => {
 document.getElementById("catalogo").innerHTML = "Error cargando datos";
 console.error(error);
});

</script>

</body>
</html>
