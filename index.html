

 <!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>De Todo Un Poco</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body {
 font-family: 'Poppins', sans-serif;
 margin:0;
 background:#f5f5f5;
}

header {
 background:#ff7a00;
 color:white;
 text-align:center;
 padding:30px;
}

.container {
 padding:20px;
 max-width:1200px;
 margin:auto;
}

.buscador {
 text-align:center;
 margin-bottom:20px;
}

.buscador input {
 padding:10px;
 width:80%;
 max-width:400px;
 border-radius:10px;
 border:1px solid #ccc;
}

.filtros {
 text-align:center;
 margin-bottom:20px;
}

.filtros button {
 margin:5px;
 padding:8px 15px;
 border:none;
 border-radius:20px;
 cursor:pointer;
 background:#ddd;
}

.filtros button:hover {
 background:#ff7a00;
 color:white;
}

.grid {
 display:grid;
 grid-template-columns: repeat(auto-fit, minmax(220px,1fr));
 gap:20px;
}

.card {
 background:white;
 padding:15px;
 border-radius:15px;
 box-shadow:0 4px 10px rgba(0,0,0,0.1);
 text-align:center;
}

.card img {
 width:100%;
 height:200px;
 object-fit:cover;
 border-radius:10px;
}

.btn {
 background:#25D366;
 color:white;
 padding:10px;
 border:none;
 border-radius:10px;
 cursor:pointer;
 margin-top:10px;
 width:100%;
}
</style>

</head>
<body>

<header>
<h1>De Todo Un Poco</h1>
<p>Catálogo de productos</p>
</header>

<div class="container">

<div class="buscador">
<input type="text" id="buscar" placeholder="Buscar producto...">
</div>

<div class="filtros" id="filtros"></div>

<div class="grid" id="catalogo"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<script>

const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSYFL6PZVNPKR0cIvM_rdBBFv9lzARFUx3auKhbnTqKe5iooMhgwmUEziLAsyBWWgoydXprwM3qRpUT/pub?output=csv";

let productos = [];

Papa.parse(url, {
 download: true,
 header: true,
 delimiter: ";", // 👈 SOLUCIÓN CLAVE
 skipEmptyLines: true,
 complete: function(results) {

   console.log(results.data);

   productos = results.data.filter(p => p.Nombre);

   mostrarProductos(productos);
   crearFiltros();
 }
});

function mostrarProductos(lista) {
 const catalogo = document.getElementById("catalogo");
 catalogo.innerHTML = "";

 lista.forEach(p => {
   catalogo.innerHTML += `
   <div class="card">
     <img src="${p.Imagen || 'https://via.placeholder.com/300'}">
     <h3>${p.Nombre}</h3>
     <p>${p.Precio}</p>
     <a href="${p.WhatsApp}" target="_blank">
       <button class="btn">Consultar</button>
     </a>
   </div>`;
 });
}

function crearFiltros() {
 const categorias = [...new Set(productos.map(p => p.Categoria))];
 const contenedor = document.getElementById("filtros");

 contenedor.innerHTML = `<button onclick="mostrarProductos(productos)">Todos</button>`;

 categorias.forEach(cat => {
   if(cat){
     contenedor.innerHTML += `<button onclick="filtrar('${cat}')">${cat}</button>`;
   }
 });
}

function filtrar(cat) {
 const filtrados = productos.filter(p => p.Categoria === cat);
 mostrarProductos(filtrados);
}

document.getElementById("buscar").addEventListener("keyup", e => {
 const texto = e.target.value.toLowerCase();
 const filtrados = productos.filter(p => 
   p.Nombre.toLowerCase().includes(texto)
 );
 mostrarProductos(filtrados);
});

</script>

</body>
</html>
