<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Catálogo</title>

<style>

body{
  margin:0;
  font-family:Arial;
  background:#f5f5f5;
}

header{
  background:#ff6600;
  color:white;
  padding:15px;
  text-align:center;
}

.instagram-btn{
  display:inline-flex;
  align-items:center;
  gap:10px;
  background:white;
  color:#E1306C;
  padding:10px 15px;
  border-radius:10px;
  text-decoration:none;
  font-weight:bold;
  margin-top:10px;
}

.instagram-btn img{
  width:25px;
  height:25px;
}

.buscador{
  padding:15px;
  text-align:center;
}

.buscador input{
  width:80%;
  max-width:400px;
  padding:10px;
  border-radius:8px;
  border:1px solid #ccc;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:15px;
  padding:20px;
}

.card{
  background:white;
  border-radius:10px;
  padding:10px;
  text-align:center;
  box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.card img{
  width:100%;
  height:200px;
  object-fit:cover;
  border-radius:10px;
}

.btn{
  display:block;
  margin-top:10px;
  padding:10px;
  background:#25D366;
  color:white;
  text-decoration:none;
  border-radius:5px;
  border:none;
  cursor:pointer;
  width:100%;
}

.btn:hover{
  opacity:0.9;
}

.btn-carrito{
  background:#ff6600;
}

.btn-eliminar{
  background:#ff0000;
  padding:5px 10px;
  margin-left:10px;
  width:auto;
  display:inline-block;
}

#carrito{
  background:white;
  margin:20px;
  padding:20px;
  border-radius:10px;
  box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

#listaCarrito li{
  margin-bottom:10px;
}

.datos-pago{
  background:#f9f9f9;
  padding:15px;
  border-radius:10px;
  margin-top:20px;
  border:1px solid #ddd;
}

.datos-pago p{
  margin:8px 0;
}

.whatsapp{
  background:#25D366;
  color:white;
  text-align:center;
  padding:12px;
  border-radius:8px;
  text-decoration:none;
  display:block;
  margin-top:15px;
  font-weight:bold;
}

</style>
</head>

<body>

<header>

  <h1>Catálogo</h1>

  <a
    href="https://www.instagram.com/detodo.unpoco.arg?igsh=dThreW9jdmF6OXk0"
    target="_blank"
    class="instagram-btn">

    <img
      src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png"
      alt="Instagram">

    Seguinos en Instagram

  </a>

</header>

<div class="buscador">
  <input type="text" id="busqueda" placeholder="Buscar producto...">
</div>

<div id="productos" class="grid"></div>

<div id="carrito">

  <h2>🛒 Carrito</h2>

  <ul id="listaCarrito"></ul>

  <h3>Total: $<span id="total">0</span></h3>

  <div class="datos-pago">

    <h3>💳 Datos para transferir</h3>

    <p>
      <strong>Alias:</strong>
      <span id="alias">cata.cofone.mp</span>
    </p>

    <p>
      <strong>CBU:</strong>
      <span id="cbu">0000003100001373265928</span>
    </p>

    <p>
      <strong>Titular:</strong>
      Catalina Dominguez Cofone
    </p>

    <p>
      <strong>Cuenta:</strong>
      Mercado Pago
    </p>

    <button onclick="copiarAlias()" class="btn">
      Copiar Alias
    </button>

    <button onclick="copiarCBU()" class="btn btn-carrito">
      Copiar CBU
    </button>

    <a
      class="whatsapp"
      href="https://wa.me/542325460892"
      target="_blank">

      Enviar comprobante por WhatsApp

    </a>

  </div>

</div>

<script>

const URL =
"https://opensheet.elk.sh/1YutuIhavNR7nXoREl3mJtS7IRRpvIgWWlMQnD1aRW0o/Hoja%201";

let productos = [];

let carrito = [];

let total = 0;

const contenedor =
document.getElementById("productos");

const input =
document.getElementById("busqueda");

function limpiarPrecio(precio){

  if(!precio) return "0";

  return precio.replace(/[^0-9]/g, "");
}

function actualizarCarrito(){

  const lista =
  document.getElementById("listaCarrito");

  lista.innerHTML = "";

  total = 0;

  carrito.forEach((producto, index) => {

    total += Number(producto.precio);

    const item =
    document.createElement("li");

    item.innerHTML = `
      ${producto.nombre} - $${producto.precio}

      <button
      class="btn-eliminar"
      onclick="eliminarDelCarrito(${index})">

      Eliminar

      </button>
    `;

    lista.appendChild(item);

  });

  document.getElementById("total").textContent =
  total;
}

function agregarAlCarrito(nombre, precio){

  carrito.push({
    nombre:nombre,
    precio:precio
  });

  actualizarCarrito();
}

function eliminarDelCarrito(index){

  carrito.splice(index, 1);

  actualizarCarrito();
}

function copiarAlias(){

  const texto =
  document.getElementById("alias").textContent;

  navigator.clipboard.writeText(texto);

  alert("Alias copiado");
}

function copiarCBU(){

  const texto =
  document.getElementById("cbu").textContent;

  navigator.clipboard.writeText(texto);

  alert("CBU copiado");
}

function mostrar(lista){

  contenedor.innerHTML = "";

  lista.forEach(p => {

    if(!p.IMAGEN || !p.NOMBRE) return;

    const precioLimpio =
    limpiarPrecio(p.PRECIO);

    const card =
    document.createElement("div");

    card.className = "card";

    card.innerHTML = `
      <img src="${p.IMAGEN}"
      onerror="this.src='https://via.placeholder.com/200'">

      <h3>${p.NOMBRE}</h3>

      <p>$${precioLimpio}</p>

      <p>${p.CATEGORIA || ""}</p>

      <button
      class="btn btn-carrito"
      onclick="agregarAlCarrito('${p.NOMBRE}', '${precioLimpio}')">

      Agregar al carrito

      </button>

      <a
      class="btn"
      href="${p.WHATSAPP}"
      target="_blank">

      Consultar

      </a>
    `;

    contenedor.appendChild(card);

  });
}

fetch(URL)

.then(r => r.json())

.then(data => {

  console.log(data);

  productos = data;

  mostrar(productos);

});

input.addEventListener("input", () => {

  const t =
  input.value.toLowerCase();

  const filtrados =
  productos.filter(p =>

    (p.NOMBRE &&
    p.NOMBRE.toLowerCase().includes(t))

    ||

    (p.CATEGORIA &&
    p.CATEGORIA.toLowerCase().includes(t))

  );

  mostrar(filtrados);

});

</script>

</body>
</html>
